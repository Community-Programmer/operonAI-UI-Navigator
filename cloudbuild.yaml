# ─────────────────────────────────────────────────────────────────────
# Cloud Build — Build, Push & Deploy Operon Server
# ─────────────────────────────────────────────────────────────────────
# Triggered automatically on push to main via Cloud Build trigger.
# Uses commit SHA as the immutable image tag.
# ─────────────────────────────────────────────────────────────────────

steps:
  # ── Step 1: Build the Docker image ──────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/operon-server:${COMMIT_SHA}'
      - '-f'
      - 'server/Dockerfile'
      - '.'

  # ── Step 2: Push the image to Artifact Registry ─────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/operon-server:${COMMIT_SHA}'

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/operon-server:${COMMIT_SHA}'
      - '--region'
      - '${_REGION}'

# Substitution defaults — overridden by the Cloud Build trigger
substitutions:
  _REGION: us-central1
  _REPO_NAME: operon-server
  _SERVICE_NAME: operon-server

options:
  logging: CLOUD_LOGGING_ONLY
